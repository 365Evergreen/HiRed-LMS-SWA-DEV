name: Deploy Function App

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy-function:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install function dependencies
        working-directory: './functions'
        run: |
          npm ci --prefer-offline --no-audit --progress=false || npm install

      - name: Deploy to Azure Function App
        uses: azure/functions-action@v1
        with:
          # Provide either publish-profile (recommended) or both app-name + package
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: './functions'

      - name: Confirm deployment
        run: echo "Function deployment completed. If you used publish-profile, confirm the Function App 'dataverse-proxy' exists in the Functions blade."

# Notes for repository maintainer:
# 1) Create an Azure Function App in your subscription (Linux or Windows worker is fine).
# 2) In the Function App > Overview > Get publish profile, copy the XML and add it as
#    the secret `AZURE_FUNCTIONAPP_PUBLISH_PROFILE` in this repo (Settings -> Secrets).
# 3) After the workflow runs successfully, set `DATAVERSE_URL` and any other required
#    app settings in the Function App Configuration (e.g., DATAVERSE_URL=https://org1ea400d5.crm.dynamics.com).
# 4) Optionally link the Function App as your SWA backend (Static Web App -> APIs -> Link backend).
